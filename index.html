<!DOCTYPE html>
<html>
<head>

<title>IPL Auction</title>

<style>

body{
font-family: Arial;
background:#0f172a;
color:white;
text-align:center;
}

.card{
background:#1e293b;
padding:20px;
margin:20px;
border-radius:10px;
display:inline-block;
width:280px;
}

button{
background:#22c55e;
border:none;
padding:10px;
color:white;
cursor:pointer;
}

input{
padding:6px;
margin:5px;
}

</style>

</head>

<body>

<h1>🏏 IPL Player Auction</h1>

{% for p in players %}

<div class="card">

<h2>{{p.name}}</h2>

<p>Age : {{p.age}}</p>
<p>Innings : {{p.innings}}</p>
<p>Runs : {{p.runs}}</p>

<p>💰 Current Bid : ₹{{p.bid}}</p>
<p>Company : {{p.company}}</p>

<form action="/bid/{{p.id}}" method="post">

<input type="text" name="company" placeholder="Company Name" required>

<input type="number" name="bid" placeholder="Bid Amount" required>

<button type="submit">Place Bid</button>

</form>

</div>

{% endfor %}

</body>
</html>
